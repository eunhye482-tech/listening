<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>English Master - Facial Expressions</title>
    <style>
        :root { 
            --yellow-light: #FFFDE7; 
            --yellow-pale: #FFF9C4; 
            --yellow-main: #FBC02D; 
            --yellow-dark: #F57F17;
            --pink-soft: #FFF5F7;
            --text-dark: #5D4037;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #FFFEF0; display: flex; justify-content: center; min-height: 100vh; }
        .phone-container { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { padding: 12px; text-align: center; font-weight: bold; color: var(--yellow-dark); border-bottom: 1px solid var(--yellow-pale); background: white; font-size: 0.95rem; position: sticky; top: 0; z-index: 10; }
        #display-area { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        
        .hidden { display: none !important; }
        .btn-next { background: var(--yellow-main); color: var(--text-dark); padding: 16px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-step3 { background: #FFF59D; color: var(--text-dark); padding: 16px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; border: 2px solid var(--yellow-main); }

        /* STEP 1: 인트로 구성 보강 */
        .main-title-card { width: 100%; background: var(--yellow-main); padding: 25px 15px; border-radius: 20px; color: var(--text-dark); margin-bottom: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .main-title-card h1 { margin: 0; font-size: 1.4rem; font-weight: 900; line-height: 1.3; }

        .structure-container { background: var(--yellow-light); border: 2px solid var(--yellow-pale); border-radius: 20px; padding: 20px; margin-bottom: 20px; color: var(--text-dark); }
        .struct-item { margin-bottom: 18px; border-bottom: 1px dashed var(--yellow-pale); padding-bottom: 10px; }
        .struct-item:last-child { border: none; }
        .struct-label { font-weight: 900; color: #E65100; font-size: 0.95rem; display: block; margin-bottom: 6px; }
        .struct-text { font-size: 0.9rem; line-height: 1.6; font-weight: 500; text-align: justify; }

        .topic-area { background: var(--pink-soft); border: 2px solid #F8BBD0; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 10px; }
        .topic-title { font-weight: bold; color: #D81B60; font-size: 0.85rem; display: block; margin-bottom: 10px; }
        .topic-kor { font-weight: bold; color: #333; font-size: 1rem; display: block; line-height: 1.5; margin-bottom: 8px; }
        .topic-eng { font-size: 0.85rem; color: #666; font-style: italic; display: block; line-height: 1.4; }

        /* 공통 학습 요소 */
        .sentence-box { background: var(--yellow-light); padding: 20px; border-radius: 20px; font-size: 1.1rem; font-weight: 700; color: var(--text-dark); margin-bottom: 15px; border: 2px solid var(--yellow-pale); text-align: center; cursor: pointer; line-height: 1.5; }
        .kor-box { background: #FFF5F7; padding: 20px; border-radius: 20px; font-size: 0.95rem; font-weight: 600; color: #D81B60; margin-bottom: 15px; border: 2px solid #F8BBD0; text-align: center; line-height: 1.6; }
        .voca-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .voca-item { background: #fff; padding: 10px; border-radius: 10px; font-size: 0.82rem; border: 1px solid var(--yellow-pale); cursor: pointer; text-align: center; font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .voca-item.revealed { background: var(--yellow-main); color: var(--text-dark); }
        .blank-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 20px; padding: 10px; background: #fdfdfd; border-radius: 15px; }
        .word-blank { border-bottom: 2px solid var(--yellow-main); min-width: 35px; text-align: center; font-size: 1rem; color: transparent; cursor: pointer; padding: 0 2px; }
        .word-blank.revealed { color: var(--text-dark); border-bottom-color: transparent; font-weight: bold; }
        .btn-check { background: #f0f0f0; padding: 12px; border-radius: 12px; border: none; font-weight: bold; margin-bottom: 10px; cursor: pointer; width: 100%; font-size: 0.9rem; }
        .trans-content { display: none; padding: 15px; background: #fafafa; border-radius: 15px; border-left: 5px solid var(--yellow-main); font-size: 0.9rem; margin-bottom: 10px; }
        .nav-btns-fixed { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; margin-top: auto; position: sticky; bottom: 0; }
        .btn-prev { background: #F5F5F5; color: #718096; padding: 16px; border-radius: 15px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; width: 30%; margin-right: 10px; }
    </style>
</head>
<body>
<div class="phone-container">
    <div class="header" id="header-title">English Master - EBS</div>
    <div id="display-area"></div>
    <div id="nav-area" class="nav-btns-fixed hidden">
        <button class="btn-prev" onclick="prevSentence()">PREV</button>
        <button class="btn-next" onclick="nextSentence()" id="main-next-btn">NEXT</button>
    </div>
</div>

<script>
    const fullData = [
        { en: "Research on the universality of facial expressions suggests that the socialization of affect involves interactions between situational variables.", ko: "얼굴 표정의 보편성에 대한 연구는 정서의 사회화가 상황적 변수들 사이의 상호작용을 포함한다는 것을 시사한다.", voca: ["universality:보편성", "facial expressions:얼굴 표정", "suggests:시사하다", "socialization:사회화", "affect:정서/감정", "involves:포함하다", "interactions:상호작용", "variables:변수", "🍎", "🍎"] },
        { en: "At the same time, emotions are in reality not separable from the particular circumstances that are associated with them.", ko: "동시에, 감정은 실제로는 그것들과 연관된 특정한 상황과 분리될 수 없다.", voca: ["reality:실제/현실", "separable:분리될 수 있는", "particular:특정한", "circumstances:상황", "associated with:~와 연관된", "🍎", "🍎", "🍎", "🍎", "🍎"] },
        { en: "The fact that it is possible to construct a list of basic emotions derives not only from facial expressions but from human expressive behaviors.", ko: "기본적인 감정의 목록을 구성하는 것이 가능하다는 사실은 얼굴 표정뿐만 아니라 인간의 표현 행동에서도 기인한다.", voca: ["construct:구성하다", "derives from:~에서 기인하다", "not only A but (also) B:A뿐만 아니라 B도", "expressive:표현적인", "behaviors:행동들", "🍎", "🍎", "🍎", "🍎", "🍎"] },
        { en: "As elements in the human communicative function, they create the necessity of response while also being shaped by it.", ko: "인간의 의사소통 기능의 요소로서, 그것들은 반응의 필요성을 만드는 동시에 그것에 의해 형성되기도 한다.", voca: ["elements:요소들", "communicative:의사소통의", "necessity:필요성", "response:반응", "being shaped:형성되는", "function:기능", "🍎", "🍎", "🍎", "🍎"] },
        { en: "The contextual reality of emotional expression transforms “state” into “experience.”", ko: "감정 표현의 맥락적 실제는 '상태'를 '경험'으로 변화시킨다.", voca: ["contextual:맥락적인", "expression:표현", "transforms:변화시키다/변형하다", "state:상태", "experience:경험", "🍎", "🍎", "🍎", "🍎", "🍎"] }
    ];

    let currentMode = 'INTRO';
    let currentIdx = 0;
    const synth = window.speechSynthesis;

    function render() {
        const area = document.getElementById('display-area');
        const nav = document.getElementById('nav-area');
        const header = document.getElementById('header-title');
        area.innerHTML = '';

        if (currentMode === 'INTRO') {
            header.innerText = "Step 1. Overview";
            nav.classList.add('hidden');
            area.innerHTML = `
                <div class="main-title-card">
                    <h1>Universality vs. Context in Facial Expressions</h1>
                </div>
                
                <div class="structure-container">
                    <div class="struct-item">
                        <span class="struct-label">📍 서론 (Intro): 보편적 정서 사회화</span>
                        <div class="struct-text">얼굴 표정의 보편성은 인류 공통의 정서적 특징이지만, 실제 사회화 과정에서는 상황적 변수들과 유한한 감정 목록이 복합적으로 상호작용함을 강조합니다.</div>
                    </div>
                    <div class="struct-item">
                        <span class="struct-label">📍 본론 (Body): 상황과의 불가분성</span>
                        <div class="struct-text">감정은 결코 독립적으로 존재하지 않으며, 웃음이나 울음과 같은 보편적 행동 역량조차도 항상 특정한 맥락 속에서만 발현되고 주변 환경의 피드백에 의해 끊임없이 재형성됩니다.</div>
                    </div>
                    <div class="struct-item">
                        <span class="struct-label">📍 결론 (Conclusion): 상태에서 경험으로</span>
                        <div class="struct-text">결과적으로 감정 표현은 고정된 내적 '상태'에 머무는 것이 아니라, 실제적인 맥락적 현실과 결합함으로써 비로소 구체적인 '경험'으로 승화되고 변형됩니다.</div>
                    </div>
                </div>

                <div class="topic-area">
                    <span class="topic-title">📌 Topic (주제)</span>
                    <span class="topic-kor">감정 표현의 보편적 능력과 맥락적 실제의 상호작용을 통한 경험의 형성</span>
                    <span class="topic-eng">The interaction between the universal capacity for emotional expression and contextual reality in shaping experience.</span>
                </div>

                <button class="btn-next" onclick="startStep(2)">STEP 2: 문장 학습 시작 ▶</button>
                <button class="btn-step3" onclick="startStep(3)">STEP 3: 영작 연습 시작 ▶</button>
            `;
        } else if (currentMode === 'STEP2' || currentMode === 'STEP3') {
            const stepNum = currentMode === 'STEP2' ? 2 : 3;
            header.innerText = `STEP ${stepNum}. (${currentIdx + 1}/${fullData.length})`;
            nav.classList.remove('hidden');
            document.getElementById('main-next-btn').innerText = (currentIdx === fullData.length - 1) ? "FINISH" : "NEXT";
            
            const item = fullData[currentIdx];
            if (currentMode === 'STEP2') {
                area.innerHTML = `
                    <div class="sentence-box" onclick="playTTS('${item.en.replace(/'/g, "\\'")}')">${item.en}</div>
                    <div class="voca-grid" id="voca-area"></div>
                    <button class="btn-check" onclick="toggleView('trans-area')">해석 확인하기</button>
                    <div id="trans-area" class="trans-content">${item.ko}</div>
                `;
                fillVoca(item.voca);
            } else {
                area.innerHTML = `
                    <div class="kor-box">${item.ko}</div>
                    <div class="blank-area" id="blank-area"></div>
                    <div class="voca-grid" id="voca-area"></div>
                    <button class="btn-check" onclick="toggleView('trans-area')">정답 확인하기</button>
                    <div id="trans-area" class="trans-content">${item.en}</div>
                `;
                fillBlanks(item.en);
                fillVoca(item.voca);
            }
        }
    }

    function fillVoca(vocaList) {
        const container = document.getElementById('voca-area');
        for (let i = 0; i < 10; i++) {
            const div = document.createElement('div');
            div.className = 'voca-item';
            if (vocaList[i] && vocaList[i] !== '🍎') {
                const [eng, kor] = vocaList[i].split(':');
                div.innerText = eng;
                div.onclick = function() { this.classList.toggle('revealed'); this.innerText = this.classList.contains('revealed') ? kor : eng; };
            } else {
                div.innerText = '🍎'; div.style.color = "#FF3B30"; div.style.cursor = "default";
            }
            container.appendChild(div);
        }
    }

    function fillBlanks(sentence) {
        const container = document.getElementById('blank-area');
        sentence.split(' ').forEach(word => {
            const span = document.createElement('span');
            span.className = 'word-blank'; span.innerText = word;
            span.onclick = function() { this.classList.add('revealed'); playTTS(word.replace(/[.,'"]/g, "")); };
            container.appendChild(span);
        });
    }

    function startStep(step) { currentMode = 'STEP' + step; currentIdx = 0; render(); }
    function nextSentence() { if (currentIdx < fullData.length - 1) { currentIdx++; render(); } else { currentMode = 'INTRO'; render(); } }
    function prevSentence() { if (currentIdx > 0) { currentIdx--; render(); } else { currentMode = 'INTRO'; render(); } }
    function playTTS(text) { synth.cancel(); const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'en-US'; utterance.rate = 0.9; synth.speak(utterance); }
    function toggleView(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    window.onload = render;
</script>
</body>
</html>
