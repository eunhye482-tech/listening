<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Master Pro</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root {
            --main-purple: #967EBD; --light-purple: #EBEAFF; --dark-purple: #7776B3;
            --bg-gray: #F2F4F7; --text-black: #2D3436; --white: #FFFFFF;
            --shadow: rgba(150, 126, 189, 0.15);
        }
        body { margin: 0; background-color: #1A1A1A; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Pretendard', sans-serif; }
        .app-screen { width: 360px; height: 680px; background: var(--bg-gray); border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; border: 6px solid #333; }
        .header { background: linear-gradient(135deg, var(--main-purple), var(--dark-purple)); color: white; padding: 50px 20px 30px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 800; }
        .header p { margin: 8px 0 0; font-size: 13px; opacity: 0.8; }
        .back-btn { position: absolute; left: 20px; top: 20px; cursor: pointer; background: rgba(255,255,255,0.2); width: 32px; height: 32px; border-radius: 10px; display: none; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; }
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: var(--white); border-radius: 20px; height: 70px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 12px var(--shadow); border: 1px solid rgba(255,255,255,0.8); }
        .card h3 { margin: 0; font-size: 17px; color: var(--text-black); font-weight: 700; text-align: center; }
        .card:active { transform: scale(0.96); background: var(--light-purple); }
        .month-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: -4px 0 16px; padding: 0 4px; }
        .month-btn { background: var(--light-purple); color: var(--main-purple); height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; cursor: pointer; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .num-btn { aspect-ratio: 1/1; background: var(--white); border-radius: 18px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 800; color: var(--main-purple); font-size: 18px; box-shadow: 0 4px 10px var(--shadow); transition: 0.2s; }
        .num-btn.special { grid-column: auto; height: auto; background: var(--white); color: var(--main-purple); }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>
<div class="app-screen">
    <div class="header">
        <div id="backBtn" class="back-btn" onclick="goBack()">〈</div>
        <h1 id="title">학년 선택</h1>
        <p id="subtitle">학습할 단계를 골라주세요</p>
    </div>
    <div class="content">
        <div id="step1">
            <div class="card" onclick="showYears('고1')"><h3>고등학교 1학년</h3></div>
            <div class="card" onclick="showYears('고2')"><h3>고등학교 2학년</h3></div>
            <div class="card" onclick="showYears('고3')"><h3>고등학교 3학년</h3></div>
        </div>
        <div id="step2" class="hidden"></div>
        <div id="step3" class="hidden">
            <div class="num-grid" id="numGrid"></div>
        </div>
    </div>
</div>
<script>
    let curGrade = '', curYear = '', curMonth = '';
    let currentStep = 1;

    function goBack() {
        if (currentStep === 3) showYears(curGrade);
        else if (currentStep === 2) goMain();
    }

    function goMain() {
        currentStep = 1;
        document.getElementById('step1').classList.remove('hidden');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.add('hidden');
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('title').innerText = "학년 선택";
        document.getElementById('subtitle').innerText = "학습할 단계를 골라주세요";
    }

    function showYears(grade) {
        currentStep = 2; curGrade = grade;
        const step2 = document.getElementById('step2');
        step2.innerHTML = '';
        const years = ['2022', '2023', '2024', '2025'];
        years.forEach(y => {
            const yearCard = document.createElement('div');
            yearCard.className = 'card';
            yearCard.innerHTML = `<h3>${y}학년도 기출</h3>`;
            const monthRow = document.createElement('div');
            monthRow.className = 'month-row hidden';
            ['3월', '6월', '9월', '11월'].forEach(m => {
                const mBtn = document.createElement('div');
                mBtn.className = 'month-btn';
                mBtn.innerText = m;
                mBtn.onclick = (e) => { e.stopPropagation(); showNums(y, m); };
                monthRow.appendChild(mBtn);
            });
            yearCard.onclick = () => {
                const isHidden = monthRow.classList.contains('hidden');
                document.querySelectorAll('.month-row').forEach(r => r.classList.add('hidden'));
                if(isHidden) monthRow.classList.remove('hidden');
            };
            step2.appendChild(yearCard);
            step2.appendChild(monthRow);
        });
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step3').classList.add('hidden');
        step2.classList.remove('hidden');
        document.getElementById('backBtn').style.display = 'flex';
        document.getElementById('title').innerText = grade;
    }

    function showNums(year, month) {
        currentStep = 3; curYear = year; curMonth = month;
        const grid = document.getElementById('numGrid');
        grid.innerHTML = '';
        for(let i=1; i<=17; i++) {
            const a = document.createElement('a');
            a.className = i === 17 ? 'num-btn special' : 'num-btn';
            
            // ✅ 깃허브용 절대 보안 경로 (소문자 listening 기준)
            // 캡처 화면 상 index.html이 listening 폴더 안에 있으므로 아래 경로가 정답입니다.
            const rawPath = `./${curGrade}/${year}/${month}/${i}.html`;
            a.href = encodeURI(rawPath);
            
            a.innerText = i;
            grid.appendChild(a);
        }
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        document.getElementById('title').innerText = `${year}년 ${month}`;
    }
</script>
</body>
</html>
