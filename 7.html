<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>English Master #7 - Coincidences</title>
    <style>
        :root { --yellow-light: #FFFDE7; --yellow-pale: #FFF9C4; --yellow-main: #FBC02D; --yellow-dark: #F57F17; --pink-soft: #FFF5F7; --text-dark: #5D4037; }
        /* 생략된 CSS는 6번과 동일 */
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: #FFFEF0; display: flex; justify-content: center; min-height: 100vh; }
        .phone-container { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { padding: 12px; text-align: center; font-weight: bold; color: var(--yellow-dark); border-bottom: 1px solid var(--yellow-pale); background: white; font-size: 0.95rem; position: sticky; top: 0; z-index: 10; }
        #display-area { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        .btn-next { background: var(--yellow-main); color: var(--text-dark); padding: 16px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-step3 { background: #FFF59D; color: var(--text-dark); padding: 16px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; border: 2px solid var(--yellow-main); }
        .main-title-card { width: 100%; background: var(--yellow-main); padding: 25px 15px; border-radius: 20px; color: var(--text-dark); margin-bottom: 20px; text-align: center; }
        .structure-container { background: var(--yellow-light); border: 2px solid var(--yellow-pale); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .struct-item { margin-bottom: 18px; border-bottom: 1px dashed var(--yellow-pale); padding-bottom: 10px; }
        .struct-label { font-weight: 900; color: #E65100; font-size: 0.95rem; display: block; margin-bottom: 6px; }
        .struct-text { font-size: 0.9rem; line-height: 1.6; }
        .topic-area { background: var(--pink-soft); border: 2px solid #F8BBD0; border-radius: 20px; padding: 20px; text-align: center; }
        .topic-kor { font-weight: bold; color: #333; font-size: 1rem; display: block; margin-bottom: 8px; }
        .topic-eng { font-size: 0.85rem; color: #666; font-style: italic; display: block; }
        .sentence-box { background: var(--yellow-light); padding: 20px; border-radius: 20px; font-size: 1.1rem; font-weight: 700; color: var(--text-dark); margin-bottom: 15px; border: 2px solid var(--yellow-pale); text-align: center; cursor: pointer; }
        .kor-box { background: #FFF5F7; padding: 20px; border-radius: 20px; font-size: 0.95rem; font-weight: 600; color: #D81B60; margin-bottom: 15px; border: 2px solid #F8BBD0; text-align: center; }
        .voca-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .voca-item { background: #fff; padding: 10px; border-radius: 10px; font-size: 0.82rem; border: 1px solid var(--yellow-pale); cursor: pointer; text-align: center; font-weight: 600; }
        .voca-item.revealed { background: var(--yellow-main); color: var(--text-dark); }
        .blank-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 20px; padding: 10px; background: #fdfdfd; border-radius: 15px; }
        .word-blank { border-bottom: 2px solid var(--yellow-main); min-width: 35px; text-align: center; font-size: 1rem; color: transparent; cursor: pointer; }
        .word-blank.revealed { color: var(--text-dark); border-bottom-color: transparent; font-weight: bold; }
        .btn-check { background: #f0f0f0; padding: 12px; border-radius: 12px; border: none; font-weight: bold; width: 100%; }
        .trans-content { display: none; padding: 15px; background: #fafafa; border-radius: 15px; border-left: 5px solid var(--yellow-main); margin-bottom: 10px; }
        .nav-btns-fixed { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; position: sticky; bottom: 0; }
        .btn-prev { background: #F5F5F5; color: #718096; padding: 16px; border-radius: 15px; border: none; width: 30%; margin-right: 10px; }
    </style>
</head>
<body>
<div class="phone-container">
    <div class="header" id="header-title">English Master #7</div>
    <div id="display-area"></div>
    <div id="nav-area" class="nav-btns-fixed hidden">
        <button class="btn-prev" onclick="prevSentence()">PREV</button>
        <button class="btn-next" onclick="nextSentence()" id="main-next-btn">NEXT</button>
    </div>
</div>
<script>
    const fullData = [
        { en: "There are two classic problems to evaluate coincidences: the birthday problem and the monkey problem.", ko: "우연의 일치를 평가하는 두 가지 전형적인 문제가 있는데, 생일 문제와 원숭이 문제입니다.", voca: ["classic:전형적인", "evaluate:평가하다", "coincidences:우연의 일치", "counterintuitive:직관에 반하는", "odds:확률", "🍎", "🍎", "🍎", "🍎", "🍎"] },
        { en: "In a group of 23 people, the odds are better than even that two people have the same birthday.", ko: "23명의 그룹에서 두 사람이 같은 생일을 가질 확률은 50%보다 높습니다.", voca: ["group:집단", "even:대등한/똑같은", "likelihood:가능성", "randomly:무작위로", "frequently:빈번하게", "🍎", "🍎", "🍎", "🍎", "🍎"] },
        { en: "The law of truly large numbers tell us that any likelihood is bound to happen at some time.", ko: "진정한 대수의 법칙은 어떤 가능성이든 언젠가는 반드시 일어나기 마련이라는 것을 말해줍니다.", voca: ["truly:진정으로", "bound to:반드시 ~하는", "theorem:정리(수학)", "ambiguous:모호한", "common:흔한", "🍎", "🍎", "🍎", "🍎", "🍎"] },
        { en: "Coincidences happen far more frequently than we expect due to various mathematical laws.", ko: "우연의 일치는 여러 수학적 법칙 때문에 우리가 예상하는 것보다 훨씬 더 빈번하게 발생합니다.", voca: ["frequently:빈번하게", "expect:예상하다", "law:법칙", "various:다양한", "frequently:빈번하게", "🍎", "🍎", "🍎", "🍎", "🍎"] },
        { en: "It gives a sense of just how common coincidences are.", ko: "그것은 우연의 일치가 얼마나 흔한 것인지에 대한 감각을 제공합니다.", voca: ["sense:감각", "common:흔한", "nutshell:요약", "likelihood:가능성", "proven:증명된", "🍎", "🍎", "🍎", "🍎", "🍎"] }
    ];
    let currentMode = 'INTRO'; let currentIdx = 0; const synth = window.speechSynthesis;
    function render() {
        const area = document.getElementById('display-area'); const nav = document.getElementById('nav-area'); const header = document.getElementById('header-title'); area.innerHTML = '';
        if (currentMode === 'INTRO') {
            header.innerText = "Step 1. Overview"; nav.classList.add('hidden');
            area.innerHTML = `<div class="main-title-card"><h1>Why Coincidences Are Common</h1></div>
                <div class="structure-container">
                    <div class="struct-item"><span class="struct-label">📍 서론: 우연을 설명하는 두 가지 난제</span><div class="struct-text">생일 문제와 원숭이 문제는 우리가 우연의 일치를 수학적으로 어떻게 평가해야 하는지 보여주는 고전적인 사례입니다.</div></div>
                    <div class="struct-item"><span class="struct-label">📍 본론: 대수의 법칙과 확률의 원리</span><div class="struct-text">숨겨진 변수의 이론과 대수의 법칙 등은 우연의 일치가 왜 우리의 직관보다 훨씬 자주 발생하는지 논리적인 근거를 제공합니다.</div></div>
                    <div class="struct-item"><span class="struct-label">📍 결론: 진정한 대수의 법칙</span><div class="struct-text">아무리 낮은 가능성이라도 충분한 기회가 주어진다면 결국 발생할 수밖에 없다는 철학적 격언은 우연의 흔함을 일깨워 줍니다.</div></div>
                </div>
                <div class="topic-area"><span class="topic-kor">수학적 법칙을 통해 이해하는 우연의 일치의 빈번함과 필연성</span><span class="topic-eng">The frequency and inevitability of coincidences understood through mathematical laws.</span></div>
                <button class="btn-next" onclick="startStep(2)">STEP 2: 문장 학습 시작 ▶</button><button class="btn-step3" onclick="startStep(3)">STEP 3: 영작 연습 시작 ▶</button>`;
        } else {
            const stepNum = currentMode === 'STEP2' ? 2 : 3; header.innerText = `STEP ${stepNum}. (${currentIdx + 1}/${fullData.length})`; nav.classList.remove('hidden'); document.getElementById('main-next-btn').innerText = (currentIdx === fullData.length - 1) ? "FINISH" : "NEXT";
            const item = fullData[currentIdx];
            if (currentMode === 'STEP2') {
                area.innerHTML = `<div class="sentence-box" onclick="playTTS('${item.en.replace(/'/g, "\\'")}')">${item.en}</div><div class="voca-grid" id="voca-area"></div><button class="btn-check" onclick="toggleView('trans-area')">해석 확인하기</button><div id="trans-area" class="trans-content">${item.ko}</div>`; fillVoca(item.voca);
            } else {
                area.innerHTML = `<div class="kor-box">${item.ko}</div><div class="blank-area" id="blank-area"></div><div class="voca-grid" id="voca-area"></div><button class="btn-check" onclick="toggleView('trans-area')">정답 확인하기</button><div id="trans-area" class="trans-content">${item.en}</div>`; fillBlanks(item.en); fillVoca(item.voca);
            }
        }
    }
    function fillVoca(v) { const c = document.getElementById('voca-area'); v.forEach(i => { const d = document.createElement('div'); d.className = 'voca-item'; if(i!=='🍎'){ const [e,k]=i.split(':'); d.innerText=e; d.onclick=function(){this.classList.toggle('revealed');this.innerText=this.classList.contains('revealed')?k:e;}; }else{ d.innerText='🍎';d.style.color="#FF3B30"; } c.appendChild(d); }); }
    function fillBlanks(s) { const c = document.getElementById('blank-area'); s.split(' ').forEach(w => { const sp = document.createElement('span'); sp.className = 'word-blank'; sp.innerText = w; sp.onclick = function() { this.classList.add('revealed'); playTTS(w.replace(/[.,'"]/g, "")); }; c.appendChild(sp); }); }
    function startStep(s) { currentMode = 'STEP' + s; currentIdx = 0; render(); }
    function nextSentence() { if (currentIdx < fullData.length - 1) { currentIdx++; render(); } else { currentMode = 'INTRO'; render(); } }
    function prevSentence() { if (currentIdx > 0) { currentIdx--; render(); } else { currentMode = 'INTRO'; render(); } }
    function playTTS(t) { synth.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; u.rate = 0.9; synth.speak(u); }
    function toggleView(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    window.onload = render;
</script>
</body>
</html>
