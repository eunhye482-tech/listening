<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Master - Select Question</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root {
            --bg: #0f172a;
            --coral: #f43f5e;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; color: var(--coral); }
        p { color: #94a3b8; margin-bottom: 40px; }
        
        /* 1~17 버튼 그리드 */
        .question-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }
        .q-btn {
            aspect-ratio: 1/1;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
        }
        .q-btn:hover {
            background: var(--coral);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(244, 63, 94, 0.3);
        }
        .back-btn {
            margin-top: 40px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid #94a3b8;
        }
    </style>
</head>
<body>

    <h1>모의고사 문항 선택</h1>
    <p>학습할 문항 번호를 선택하세요.</p>

    <div class="question-grid" id="grid">
        </div>

    <a href="../../../index.html" class="back-btn">메인 화면으로 돌아가기</a>

    <script>
        const grid = document.getElementById('grid');
        // 1번부터 17번까지 버튼 생성
        for (let i = 1; i <= 17; i++) {
            const btn = document.createElement('a');
            btn.href = `${i}.html`;
            btn.className = 'q-btn';
            btn.innerText = i;
            grid.appendChild(btn);
        }
    </script>
</body>
</html>
