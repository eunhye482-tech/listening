<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Master - Question 4</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root {
            --bg: #0f172a; --card: rgba(255, 255, 255, 0.05);
            --coral: #f43f5e; --text: #f1f5f9; --sub: #94a3b8; --green: #10b981;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 440px; }
        .step { display: none; animation: fadeIn 0.4s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: var(--card); padding: 30px 25px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); position: relative; text-align: center; }
        .mark-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; z-index: 10; display: none; }
        .options { list-style: none; padding: 0; margin-top: 25px; text-align: left; }
        .opt { padding: 16px; background: rgba(255,255,255,0.02); margin-bottom: 10px; border-radius: 16px; cursor: pointer; border: 1px solid transparent; transition: 0.3s; font-size: 0.95rem; }
        .opt.selected { border-color: var(--coral); background: rgba(244, 63, 94, 0.1); }
        .opt.correct-highlight { border-color: var(--green); background: rgba(16, 185, 129, 0.1); color: var(--green); font-weight: bold; }
        .word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .word-card { background: var(--card); padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: center; cursor: pointer; font-weight: 600; min-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
        .blank { display: inline-block; min-width: 45px; color: transparent; border-bottom: 2.5px solid var(--coral); margin: 0 3px; cursor: pointer; transition: 0.4s; }
        .blank.revealed { color: var(--coral); border-bottom-color: transparent; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 20px; background: var(--coral); color: white; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 15px; }
        .btn-audio { background: #334155; margin-bottom: 15px; }
        .trans { color: var(--sub); font-size: 0.85rem; margin-top: 25px; line-height: 1.6; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .q-img { width: 100%; border-radius: 16px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.2); background: #fff; display: block; }
    </style>
</head>
<body>

<div class="container">
    <section id="step1" class="step active">
        <button class="btn btn-audio" onclick="playFull()">🔊 대화 전체 듣기 (1.1x)</button>
        <div class="glass-card">
            <svg class="mark-svg" id="svgCircle" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" stroke="#f43f5e" stroke-width="8" fill="none" stroke-linecap="round" /></svg>
            <svg class="mark-svg" id="svgSlash" viewBox="0 0 100 100"><line x1="20" y1="20" x2="80" y2="80" stroke="#f43f5e" stroke-width="8" stroke-linecap="round" /></svg>
            <h3 style="margin-bottom:15px; color:var(--coral);">QUESTION 04</h3>
            
            <img src="fish_tank.png" class="q-img" alt="어항 그림" onerror="this.src='https://via.placeholder.com/400x200?text=Check+File+Position';">
            
            <p style="margin-top:0; font-weight: 600; font-size: 0.9rem;">그림에서 대화의 내용과 일치하지 않는 것을 고르시오.</p>
            <ul class="options">
                <li class="opt" onclick="selectOpt(1, this)">① 배 (Bottom left)</li>
                <li class="opt" onclick="selectOpt(2, this)">② 비치 체어 (Center)</li>
                <li class="opt" onclick="selectOpt(3, this)">③ 불가사리 (Next to the chair)</li>
                <li class="opt" onclick="selectOpt(4, this)">④ 서핑 보드 (Two on the right side)</li>
                <li class="opt" onclick="selectOpt(5, this)">⑤ 물고기 (Top left)</li>
            </ul>
        </div>
        <button class="btn" onclick="grade()">채점하기</button>
    </section>

    <section id="step2" class="step">
        <h3 style="color:var(--coral); text-align: center;">Voca & Phrase</h3>
        <div class="word-grid" id="wordGrid"></div>
        <button class="btn" onclick="goStep(3)">받아쓰기 시작 (빈칸 3개 강화)</button>
    </section>

    <section id="step3" class="step">
        <div class="glass-card" id="dictCard" style="min-height: 250px;"></div>
        <button class="btn btn-audio" onclick="playCurrent()">🔊 문장 다시 듣기</button>
        <button class="btn" onclick="nextDict()">다음 문장</button>
    </section>
</div>

<script>
    let selectedNum = 0;
    const correctNum = 4;
    let currentIdx = 0;
    let vF = null; let vM = null;

    function setupVoices() {
        const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
        vM = voices.find(v => v.name.includes('David') || v.name.toLowerCase().includes('male')) || voices[1] || voices[0];
        vF = voices.find(v => (v.name.includes('Zira') || v.name.toLowerCase().includes('female')) && v !== vM) || voices[0];
    }
    if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = setupVoices; }
    setupVoices();

    const dictData = [
        { eng: "W: Yesterday, I <span class='blank' onclick='rev(this)'>decorated</span> my <span class='blank' onclick='rev(this)'>fish tank</span> like a <span class='blank' onclick='rev(this)'>beach</span>.", trans: "어제 내 어항을 해변처럼 꾸몄어." },
        { eng: "M: I’d like to see it. Do you have a picture?", trans: "보고 싶네. 사진 있니?" },
        { eng: "W: Sure. Here. Do you <span class='blank' onclick='rev(this)'>recognize</span> the <span class='blank' onclick='rev(this)'>boat</span> in the <span class='blank' onclick='rev(this)'>bottom left corner</span>?", trans: "물론이지. 여기. 왼쪽 하단 모서리에 있는 배가 뭔지 알겠니?" },
        { eng: "M: Yes. It’s the <span class='blank' onclick='rev(this)'>one</span> I <span class='blank' onclick='rev(this)'>gave you</span>, <span class='blank' onclick='rev(this)'>isn’t it</span>?", trans: "응. 내가 너에게 준 거지, 그치?" },
        { eng: "W: Right. It <span class='blank' onclick='rev(this)'>looks good</span> in the <span class='blank' onclick='rev(this)'>fish tank</span>, <span class='blank' onclick='rev(this)'>doesn’t it</span>?", trans: "맞아. 어항에 잘 어울리지, 그치?" },
        { eng: "M: It does. I love the <span class='blank' onclick='rev(this)'>beach chair</span> in the <span class='blank' onclick='rev(this)'>center</span>.", trans: "그래. 중앙에 있는 비치 체어가 정말 마음에 들어." },
        { eng: "M: I see a <span class='blank' onclick='rev(this)'>starfish</span> <span class='blank' onclick='rev(this)'>next to</span> the <span class='blank' onclick='rev(this)'>chair</span>.", trans: "의자 옆에 불가사리가 보이네." },
        { eng: "W: Isn’t it cute? And do you see <span class='blank' onclick='rev(this)'>these two</span> <span class='blank' onclick='rev(this)'>surf boards</span> on the <span class='blank' onclick='rev(this)'>right side</span>?", trans: "귀엽지 않니? 그리고 오른쪽에 있는 이 두 개의 서핑 보드도 보이니?" },
        { eng: "M: Yeah. I like how you <span class='blank' onclick='rev(this)'>put both</span> of them <span class='blank' onclick='rev(this)'>side by side</span>.", trans: "응. 그것들 둘 다 나란히 놓은 게 마음에 들어." },
        { eng: "W: I thought <span class='blank' onclick='rev(this)'>that’d</span> <span class='blank' onclick='rev(this)'>look cool</span>.", trans: "그게 멋져 보일 거라고 생각했어." },
        { eng: "M: Your fish in the <span class='blank' onclick='rev(this)'>top left corner</span> looks <span class='blank' onclick='rev(this)'>happy</span> with its <span class='blank' onclick='rev(this)'>new home</span>.", trans: "왼쪽 상단 모서리에 있는 네 물고기가 새 집이 마음에 들어서 행복해 보여." },
        { eng: "W: I hope so.", trans: "나도 그러길 바라." }
    ];

    const vocaData = [
        ["decorate", "꾸미다"], ["fish tank", "어항"], ["recognize", "알아보다"], ["bottom left", "왼쪽 하단"],
        ["beach chair", "비치 체어"], ["starfish", "불가사리"], ["surf board", "서핑 보드"], ["side by side", "나란히"],
        ["top left", "왼쪽 상단"], ["look cool", "멋져 보이다"]
    ];

    function speak(text) {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text.replace(/^[WM]:\s*/, ""));
        uttr.lang = 'en-US'; uttr.rate = 1.1; 
        if (text.trim().startsWith("W:")) { uttr.voice = vM; uttr.pitch = 0.8; }
        else { uttr.voice = vF; uttr.pitch = 1.2; }
        window.speechSynthesis.speak(uttr);
    }

    function playFull() {
        window.speechSynthesis.cancel();
        let i = 0;
        function play() {
            if (i < dictData.length) {
                const line = dictData[i].eng.replace(/<[^>]*>/g, "");
                const uttr = new SpeechSynthesisUtterance(line.replace(/^[WM]:\s*/, ""));
                uttr.lang = 'en-US'; uttr.rate = 1.1;
                if (line.trim().startsWith("W:")) { uttr.voice = vM; uttr.pitch = 0.8; }
                else { uttr.voice = vF; uttr.pitch = 1.2; }
                uttr.onend = () => { i++; play(); };
                window.speechSynthesis.speak(uttr);
            }
        }
        play();
    }

    window.onload = () => {
        setupVoices();
        const grid = document.getElementById('wordGrid');
        for (let i = 0; i < 10; i++) {
            if (vocaData[i]) grid.innerHTML += `<div class="word-card" onclick="toggleV(this, '${vocaData[i][1]}')">${vocaData[i][0]}</div>`;
            else grid.innerHTML += `<div class="word-card">🍍</div>`;
        }
        loadDict();
    };

    function selectOpt(n, el) {
        selectedNum = n;
        document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
    }

    function grade() {
        if(!selectedNum) return alert("답을 선택해 주세요!");
        const isCorrect = (selectedNum === correctNum);
        document.getElementById(isCorrect ? 'svgCircle' : 'svgSlash').style.display = 'block';
        if (!isCorrect) document.querySelectorAll('.opt')[correctNum - 1].classList.add('correct-highlight');
        setTimeout(() => { if(confirm("학습 단계로 이동할까요?")) goStep(2); }, 1500);
    }

    function toggleV(el, m) {
        if(el.innerText === "🍍") return;
        if(!el.dataset.e) el.dataset.e = el.innerText;
        el.innerText = (el.innerText === el.dataset.e) ? m : el.dataset.e;
        el.style.color = (el.innerText === m) ? 'var(--coral)' : 'var(--text)';
    }

    function loadDict() {
        const d = dictData[currentIdx];
        document.getElementById('dictCard').innerHTML = `<p style="font-size:1.15rem; line-height:1.8;">${d.eng}</p><p class="trans">${d.trans}</p>`;
    }
    function rev(el) { el.classList.add('revealed'); }
    function playCurrent() { speak(dictData[currentIdx].eng.replace(/<[^>]*>/g, "")); }
    function nextDict() {
        if(currentIdx < dictData.length - 1) { currentIdx++; loadDict(); }
        else { alert("4번 완료!"); location.href="listening.html"; }
    }
    function goStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }
</script>
</body>
</html>
