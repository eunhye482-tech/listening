<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Master - Question 17</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root {
            --bg: #0f172a; --card: rgba(255, 255, 255, 0.05);
            --coral: #f43f5e; --text: #f1f5f9; --sub: #94a3b8; --green: #10b981;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 440px; }
        .step { display: none; animation: fadeIn 0.4s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: var(--card); padding: 30px 25px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); position: relative; text-align: center; }
        .mark-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; z-index: 10; display: none; }
        .options { list-style: none; padding: 0; margin-top: 25px; text-align: left; }
        .opt { padding: 16px; background: rgba(255,255,255,0.02); margin-bottom: 10px; border-radius: 16px; cursor: pointer; border: 1px solid transparent; transition: 0.3s; font-size: 0.95rem; }
        .opt.selected { border-color: var(--coral); background: rgba(244, 63, 94, 0.1); }
        .opt.correct-highlight { border-color: var(--green); background: rgba(16, 185, 129, 0.1); color: var(--green); font-weight: bold; }
        .word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .word-card { background: var(--card); padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: center; cursor: pointer; font-weight: 600; min-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
        .blank { display: inline-block; min-width: 45px; color: transparent; border-bottom: 2.5px solid var(--coral); margin: 0 3px; cursor: pointer; transition: 0.4s; }
        .blank.revealed { color: var(--coral); border-bottom-color: transparent; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 20px; background: var(--coral); color: white; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 15px; }
        .btn-audio { background: #334155; margin-bottom: 15px; }
        .trans { color: var(--sub); font-size: 0.85rem; margin-top: 25px; line-height: 1.6; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <section id="step1" class="step active">
        <button class="btn btn-audio" onclick="playFull()">🔊 전체 듣기 (1.1x / 성별 반전)</button>
        <div class="glass-card">
            <svg class="mark-svg" id="svgCircle" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" stroke="#f43f5e" stroke-width="8" fill="none" stroke-linecap="round" /></svg>
            <svg class="mark-svg" id="svgSlash" viewBox="0 0 100 100"><line x1="20" y1="20" x2="80" y2="80" stroke="#f43f5e" stroke-width="8" stroke-linecap="round" /></svg>
            <h3 style="margin-bottom:15px; color:var(--coral);">QUESTION 17</h3>
            <p style="margin-top:0; font-weight: 600;">다음 중 대화에서 언급된 운동이 아닌 것은?</p>
            <ul class="options">
                <li class="opt" onclick="selectOpt(1, this)">① swimming</li>
                <li class="opt" onclick="selectOpt(2, this)">② cycling</li>
                <li class="opt" onclick="selectOpt(3, this)">③ horseback riding</li>
                <li class="opt" onclick="selectOpt(4, this)">④ bowling</li>
                <li class="opt" onclick="selectOpt(5, this)">⑤ walking</li>
            </ul>
        </div>
        <button class="btn" onclick="grade()">채점하기</button>
    </section>

    <section id="step2" class="step">
        <h3 style="color:var(--coral); text-align: center;">Voca & Phrase</h3>
        <div class="word-grid" id="wordGrid"></div>
        <button class="btn" onclick="goStep(3)">받아쓰기 시작 (16번 동일 지문)</button>
    </section>

    <section id="step3" class="step">
        <div class="glass-card" id="dictCard" style="min-height: 250px;"></div>
        <button class="btn btn-audio" onclick="playCurrent()">🔊 문장 다시 듣기</button>
        <button class="btn" onclick="nextDict()">다음 문장</button>
    </section>
</div>

<script>
    let selectedNum = 0;
    const correctNum = 4;
    let currentIdx = 0;
    let vM = null;

    function setupVoices() {
        const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
        vM = voices.find(v => v.name.includes('David') || v.name.toLowerCase().includes('male')) || voices[0];
    }
    if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = setupVoices; }
    setupVoices();

    const dictData = [
        { eng: "W: <span class='blank' onclick='rev(this)'>Hello</span>, <span class='blank' onclick='rev(this)'>everybody</span>. <span class='blank' onclick='rev(this)'>Welcome</span> to the <span class='blank' onclick='rev(this)'>health workshop</span>.", trans: "안녕하세요, 여러분. 건강 워크숍에 오신 것을 환영합니다." },
        { eng: "W: I’m <span class='blank' onclick='rev(this)'>Alanna Reyes</span>, the <span class='blank' onclick='rev(this)'>head trainer</span> from Eastwood <span class='blank' onclick='rev(this)'>Fitness Center</span>.", trans: "저는 Eastwood 피트니스 센터의 수석 트레이너인 Alanna Reyes입니다." },
        { eng: "W: As <span class='blank' onclick='rev(this)'>you know</span>, <span class='blank' onclick='rev(this)'>joints</span> are <span class='blank' onclick='rev(this)'>body parts</span> that <span class='blank' onclick='rev(this)'>link bones together</span>.", trans: "아시다시피, 관절은 뼈들을 하나로 연결하는 신체 부위입니다." },
        { eng: "W: And <span class='blank' onclick='rev(this)'>doing</span> certain <span class='blank' onclick='rev(this)'>physical activities</span> <span class='blank' onclick='rev(this)'>puts stress</span> on the <span class='blank' onclick='rev(this)'>joints</span>.", trans: "그리고 특정 신체 활동을 하는 것은 관절에 무리를 줍니다." },
        { eng: "W: But the <span class='blank' onclick='rev(this)'>good news</span> is that people with <span class='blank' onclick='rev(this)'>bad joints</span> can <span class='blank' onclick='rev(this)'>still do</span> certain <span class='blank' onclick='rev(this)'>exercises</span>.", trans: "하지만 좋은 소식은 관절이 좋지 않은 사람들도 여전히 특정 운동을 할 수 있다는 것입니다." },
        { eng: "W: They <span class='blank' onclick='rev(this)'>have relatively</span> <span class='blank' onclick='rev(this)'>low impact</span> <span class='blank' onclick='rev(this)'>on the joints</span>. Here are some <span class='blank' onclick='rev(this)'>examples</span>.", trans: "그 운동들은 관절에 상대적으로 충격이 적습니다. 여기 몇 가지 예가 있습니다." },
        { eng: "W: The <span class='blank' onclick='rev(this)'>first is swimming</span>. While <span class='blank' onclick='rev(this)'>swimming</span>, the <span class='blank' onclick='rev(this)'>water supports</span> your <span class='blank' onclick='rev(this)'>body weight</span>.", trans: "첫 번째는 수영입니다. 수영하는 동안 물이 여러분의 몸무게를 지탱해 줍니다." },
        { eng: "W: The <span class='blank' onclick='rev(this)'>second is cycling</span>. You <span class='blank' onclick='rev(this)'>put almost</span> <span class='blank' onclick='rev(this)'>no stress</span> on the <span class='blank' onclick='rev(this)'>knee joints</span>.", trans: "두 번째는 자전거 타기입니다. 무릎 관절에 거의 무리가 가지 않습니다." },
        { eng: "W: <span class='blank' onclick='rev(this)'>Horseback riding</span> is another <span class='blank' onclick='rev(this)'>exercise</span> that <span class='blank' onclick='rev(this)'>puts very little</span> stress on your knees.", trans: "승마는 무릎에 매우 적은 무리를 주는 또 다른 운동입니다." },
        { eng: "W: <span class='blank' onclick='rev(this)'>Lastly, walking</span> is <span class='blank' onclick='rev(this)'>great</span> because it’s <span class='blank' onclick='rev(this)'>low-impact</span>, unlike running.", trans: "마지막으로, 걷기는 달리기와 달리 충격이 적기 때문에 훌륭합니다." },
        { eng: "W: If <span class='blank' onclick='rev(this)'>you have</span> bad <span class='blank' onclick='rev(this)'>joints</span>, <span class='blank' onclick='rev(this)'>don’t give up</span> <span class='blank' onclick='rev(this)'>exercising</span>.", trans: "관절이 좋지 않더라도 운동을 포기하지 마세요." },
        { eng: "W: <span class='blank' onclick='rev(this)'>Instead</span>, <span class='blank' onclick='rev(this)'>stay active</span> and <span class='blank' onclick='rev(this)'>stay healthy</span>!", trans: "대신, 활동적으로 지내고 건강을 유지하세요!" }
    ];

    const vocaData = [
        ["joint", "관절"], ["relatively", "상대적으로"], ["low impact", "저충격"], ["support", "지탱하다"],
        ["horseback riding", "승마"], ["unlike", "~와 달리"], ["stay active", "활동적으로 지내다"], ["link", "연결하다"],
        ["physical activity", "신체 활동"], ["give up", "포기하다"]
    ];

    function speak(text) {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text.replace(/^[WM]:\s*/, ""));
        uttr.lang = 'en-US'; uttr.rate = 1.1; 
        uttr.voice = vM; uttr.pitch = 0.8;
        window.speechSynthesis.speak(uttr);
    }

    function playFull() {
        window.speechSynthesis.cancel();
        let i = 0;
        function play() {
            if (i < dictData.length) {
                const line = dictData[i].eng.replace(/<[^>]*>/g, "");
                const uttr = new SpeechSynthesisUtterance(line.replace(/^[WM]:\s*/, ""));
                uttr.lang = 'en-US'; uttr.rate = 1.1;
                uttr.voice = vM; uttr.pitch = 0.8;
                uttr.onend = () => { i++; play(); };
                window.speechSynthesis.speak(uttr);
            }
        }
        play();
    }

    window.onload = () => {
        setupVoices();
        const grid = document.getElementById('wordGrid');
        for (let i = 0; i < 10; i++) {
            if (vocaData[i]) grid.innerHTML += `<div class="word-card" onclick="toggleV(this, '${vocaData[i][1]}')">${vocaData[i][0]}</div>`;
            else grid.innerHTML += `<div class="word-card">🍍</div>`;
        }
        loadDict();
    };

    function selectOpt(n, el) {
        selectedNum = n;
        document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
    }

    function grade() {
        if(!selectedNum) return alert("답을 선택해 주세요!");
        const isCorrect = (selectedNum === correctNum);
        document.getElementById(isCorrect ? 'svgCircle' : 'svgSlash').style.display = 'block';
        if (!isCorrect) {
            document.querySelectorAll('.opt')[correctNum - 1].classList.add('correct-highlight');
            alert("틀렸습니다! 정답은 ④번입니다.");
        }
        setTimeout(() => { if(confirm("학습 단계로 이동할까요?")) goStep(2); }, 1500);
    }

    function toggleV(el, m) {
        if(el.innerText === "🍍") return;
        if(!el.dataset.e) el.dataset.e = el.innerText;
        el.innerText = (el.innerText === el.dataset.e) ? m : el.dataset.e;
        el.style.color = (el.innerText === m) ? 'var(--coral)' : 'var(--text)';
    }

    function loadDict() {
        const d = dictData[currentIdx];
        document.getElementById('dictCard').innerHTML = `<p style="font-size:1.15rem; line-height:1.8;">${d.eng}</p><p class="trans">${d.trans}</p>`;
    }
    function rev(el) { el.classList.add('revealed'); }
    function playCurrent() { speak(dictData[currentIdx].eng.replace(/<[^>]*>/g, "")); }
    function nextDict() {
        if(currentIdx < dictData.length - 1) { currentIdx++; loadDict(); }
        else { alert("17번 완료!"); location.href="listening.html"; }
    }
    function goStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    }
</script>
</body>
</html>
